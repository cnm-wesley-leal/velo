# Workflow de Integração Contínua responsável por executar os testes unitários do projeto.
# Estrutura preparada para expansão futura com novos jobs (lint, build, deploy, etc.).

name: Continuous Integration

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Realiza o checkout do repositório
      - name: Checkout
        uses:  actions/checkout@v6.0.2

      # Configura a versão do Node.js definida nas variáveis globais
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciar o Yarn corretamente
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências do projeto com base no yarn.lock
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # Executa os testes unitários com o Vitest
      - name: Run Unit Tests
        run: yarn test

  build-and-deploy:
    name: Build and Deploy
    needs: [unit-tests]
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      # Realiza o checkout do repositório
      - name: Checkout
        uses:  actions/checkout@v6.0.2

      # Configura a versão do Node.js definida nas variáveis globais
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciar o Yarn corretamente
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências do projeto com base no yarn.lock
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # Obter configurações as configurações do Vercel
      - name: Pull Vercel Config
        run: yarn vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      # Executa o build no Vercel
      - name: Build Vercel
        run: yarn vercel build --token=$VERCEL_TOKEN

      # Executa o deploy no Vercel
      - name: Deploy Vercel
        id: deploy
        run: |
          URL=$(yarn --silent vercel deploy --prebuilt --target=preview --token=$VERCEL_TOKEN)
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

  e2e-tests:
    name: E2E Tests
    needs: [build-and-deploy]
    runs-on: ubuntu-latest

    steps:
      # Realiza o checkout do repositório
      - name: Checkout
        uses:  actions/checkout@v6.0.2

      # Configura a versão do Node.js definida nas variáveis globais
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciar o Yarn corretamente
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências do projeto com base no yarn.lock
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # Instala os navegadores de teste do Playwright
      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps chromium

      # Executa os testes e2e com o Playwright
      - name: Run E2E Tests
        run: yarn playwright test playwright/tests/online.spec.ts
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.deployment-url }}

      # Relatório HTML no Vercel
      - name: Upload Playwright HTML Report
        if: ${{cancelled()}}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: test-results/
