# Workflow de Integração Contínua — Velô Sprint
#
# Gatilhos configurados:
#   - push: Dispara automaticamente a cada push na branch main
#   - workflow_dispatch: Permite execução manual pelo painel do GitHub Actions
#
# Jobs (executados em sequência):
#   1. unit-tests     → roda testes unitários (Vitest) e publica relatório
#   2. build-preview  → faz build e deploy de preview na Vercel
#   3. e2e-tests      → roda testes E2E (Playwright) contra a URL de preview
#   4. build-production → faz deploy de produção na Vercel

name: Continuous Integration

on:
  push:
    branches:
      - main

  # Execução manual via painel do GitHub Actions (Actions → Run workflow)
  workflow_dispatch:
    inputs:
      motivo:
        description: 'Motivo da execução manual (opcional)'
        required: false
        default: 'Execução manual solicitada'

env:
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
  VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  VERCEL_SCOPE: wes-leals-projects

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Unit Tests
        run: yarn test --reporter=default --reporter=json --outputFile=vitest-report/results.json

      # Publica o relatório de testes unitários como artefato da pipeline
      # Disponível em: Actions → [execução] → Artifacts → vitest-report
      - name: Upload Vitest Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report-${{ github.run_number }}
          path: vitest-report/
          retention-days: 30

  build-preview:
    name: Build and Deploy Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Pull Vercel Config (Preview)
        run: |
          yarn vercel pull --yes \
            --environment=preview \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_SCOPE

      - name: Build Preview
        run: yarn vercel build --token=$VERCEL_TOKEN

      - name: Deploy Preview
        id: deploy
        run: |
          echo "=== RAW OUTPUT ==="
          RAW=$(yarn vercel deploy --prebuilt --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE)
          echo "$RAW"
          echo "=== FIM DO OUTPUT ==="
          URL=$(echo "$RAW" | grep -oE 'https://[a-zA-Z0-9-]+-[a-zA-Z0-9]+-[a-zA-Z0-9-]+\.vercel\.app' | tail -1)
          echo "URL extraída: $URL"
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

  e2e-tests:
    name: E2E Tests
    needs: [build-preview]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/yarn.lock') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install chromium

      - name: Run E2E Tests
        run: yarn playwright test
        env:
          BASE_URL: ${{ needs.build-preview.outputs.deployment-url }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PREVIEW }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY_PREVIEW }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID_PREVIEW }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PREVIEW }}

      # Publica o relatório HTML do Playwright SEMPRE (sucesso ou falha)
      # Disponível em: Actions → [execução] → Artifacts → playwright-report
      - name: Upload Playwright HTML Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report
          retention-days: 30

      - name: Upload results to TestDino
        if: ${{ !cancelled() }}
        run: npx tdpw upload ./playwright-report --token=${{ secrets.TT_TOKEN }}

  build-production:
    name: Build and Deploy Production
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Pull Vercel Config (Production)
        run: |
          yarn vercel pull --yes \
            --environment=production \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_SCOPE

      - name: Build Production
        run: yarn vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy Production
        run: yarn vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE