# Workflow de Integração Contínua responsável por executar os testes unitários do projeto.
# Estrutura preparada para expansão futura com novos jobs (lint, build, deploy, etc.).

name: Continuous Integration

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Realiza o checkout do repositório
      - name: Checkout
        uses:  actions/checkout@v6.0.2

      # Configura a versão do Node.js definida nas variáveis globais
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciar o Yarn corretamente
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências do projeto com base no yarn.lock
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # Executa os testes unitários com o Vitest
      - name: Run Unit Tests
        run: yarn test
