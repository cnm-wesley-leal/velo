# Workflow de Integração Contínua responsável por executar os testes unitários do projeto.
# Estrutura preparada para expansão futura com novos jobs (lint, build, deploy, etc.).

name: Continuous Integration

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
  VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  VERCEL_SCOPE: wes-leals-projects

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Unit Tests
        run: yarn test

  build-preview:
    name: Build and Deploy Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Pull Vercel Config (Preview)
        run: |
          yarn vercel pull --yes \
            --environment=preview \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_SCOPE

      - name: Build Preview
        run: yarn vercel build --token=$VERCEL_TOKEN

      - name: Deploy Preview
        id: deploy
        run: |
          echo "=== RAW OUTPUT ==="
          RAW=$(yarn vercel deploy --prebuilt --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE)
          echo "$RAW"
          echo "=== FIM DO OUTPUT ==="
          URL=$(echo "$RAW" | grep -oE 'https://[a-zA-Z0-9-]+-[a-zA-Z0-9]+-[a-zA-Z0-9-]+\.vercel\.app' | tail -1)
          echo "URL extraída: $URL"
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

  e2e-tests:
    name: E2E Tests
    needs: [build-preview]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps chromium

      - name: Run E2E Tests
        run: yarn playwright test
        env:
          BASE_URL: ${{ needs.build-preview.outputs.deployment-url }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PREVIEW }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY_PREVIEW }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID_PREVIEW }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PREVIEW }}

      - name: Upload Playwright HTML Report
        if: ${{ cancelled() || failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload results to TestDino
        if: ${{ !cancelled() }}
        run: npx tdpw upload ./playwright-report --token=${{ secrets.TT_TOKEN }}

  build-production:
    name: Build and Deploy Production
    needs: [e2e-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Pull Vercel Config (Production)
        run: |
          yarn vercel pull --yes \
            --environment=production \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_SCOPE

      - name: Build Production
        run: yarn vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy Production
        run: yarn vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE